<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="logo.png">
<title>BernobreLOG+ — Gestão Logística</title>
<style>
:root{
  --bg:#0b1220; --bg2:#0e1729; --panel:#101b30; --panel2:#0c1728;
  --border:#1c2b45; --text:#e7edf7; --muted:#8ea0bd; --orange:#ff8a1e;
  --orange2:#ffb703; --green:#22c55e; --blue:#3b82f6; --red:#ef4444; --yellow:#eab308;
}
*{box-sizing:border-box}
body{margin:0;font-family:Inter,-apple-system,'Segoe UI',sans-serif;background:radial-gradient(circle at 20% 0%,#132038,var(--bg));color:var(--text);min-height:100vh}
a{color:inherit;text-decoration:none}
.hidden{display:none !important}
/* Topbar */
header.topbar{display:flex;align-items:center;gap:14px;padding:14px 24px;background:var(--panel);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50}
.logo{width:38px;height:38px;border-radius:10px;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#0c1728}
.logo img{width:100%;height:100%;object-fit:contain}
link[rel=icon]{}
.brand{font-weight:800;font-size:19px}
.brand span{color:var(--orange)}
.subtitle{color:var(--muted);font-size:12px;margin-left:4px}
.spacer{flex:1}
.userbadge{font-size:12px;color:var(--muted);background:var(--panel2);border:1px solid var(--border);padding:6px 10px;border-radius:8px}
/* Nav tabs */
nav.tabs{display:flex;gap:4px;padding:10px 24px;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto}
nav.tabs button{background:transparent;border:none;color:var(--muted);padding:9px 16px;border-radius:8px;font-size:13.5px;font-weight:600;cursor:pointer;white-space:nowrap}
nav.tabs button.active{background:linear-gradient(135deg,var(--orange),var(--orange2));color:#1a1200}
nav.tabs button:hover:not(.active){background:var(--panel);color:var(--text)}
main{padding:22px 24px 60px;max-width:1400px;margin:0 auto}
.page{display:none}
.page.active{display:block}
h2.pagetitle{font-size:20px;margin:0 0 2px}
.pagesub{color:var(--muted);font-size:13px;margin:0 0 18px}
.row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:16px}
.grid{display:grid;gap:14px}
.grid-6{grid-template-columns:repeat(6,1fr)}
.grid-3{grid-template-columns:repeat(3,1fr)}
.grid-2{grid-template-columns:repeat(2,1fr)}
@media(max-width:1100px){.grid-6{grid-template-columns:repeat(3,1fr)}.grid-3{grid-template-columns:repeat(1,1fr)}.grid-2{grid-template-columns:1fr}}
@media(max-width:640px){.grid-6{grid-template-columns:repeat(2,1fr)}}
.card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px}
.stat .label{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.05em}
.stat .value{font-size:26px;font-weight:800;margin-top:6px}
.stat .sub{color:var(--muted);font-size:11.5px;margin-top:4px}
.card h3{margin:0 0 2px;font-size:15px}
.card .desc{color:var(--muted);font-size:12px;margin:0 0 12px}
.btn{background:linear-gradient(135deg,var(--orange),var(--orange2));border:none;color:#1a1200;font-weight:700;padding:9px 16px;border-radius:8px;cursor:pointer;font-size:13px}
.btn.secondary{background:var(--panel2);color:var(--text);border:1px solid var(--border)}
.btn.danger{background:var(--red);color:#fff}
.btn.small{padding:6px 10px;font-size:12px}
.btn:disabled{opacity:.5;cursor:not-allowed}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;color:var(--muted);font-size:11px;text-transform:uppercase;padding:8px 10px;border-bottom:1px solid var(--border)}
td{padding:10px;border-bottom:1px solid var(--border)}
tr:hover td{background:rgba(255,255,255,0.02)}
.empty{text-align:center;color:var(--muted);padding:26px;font-size:13px}
.badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;display:inline-block}
.badge.pendente{background:rgba(234,179,8,.15);color:var(--yellow)}
.badge.transito{background:rgba(59,130,246,.15);color:var(--blue)}
.badge.entregue{background:rgba(34,197,94,.15);color:var(--green)}
.badge.ocorrencia{background:rgba(239,68,68,.15);color:var(--red)}
.badge.valida{background:rgba(34,197,94,.15);color:var(--green)}
.badge.aberto{background:rgba(234,179,8,.15);color:var(--yellow)}
.badge.finalizado{background:rgba(34,197,94,.15);color:var(--green)}
input,select,textarea{background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:9px 11px;font-size:13px;width:100%;font-family:inherit}
label{font-size:12px;color:var(--muted);display:block;margin-bottom:5px}
.field{margin-bottom:12px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:22px;max-width:520px;width:100%;max-height:88vh;overflow:auto}
.modal h3{margin-top:0}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:16px}
.footer-bar{display:flex;flex-wrap:wrap;gap:10px;justify-content:space-between;align-items:center;border-top:1px solid var(--border);margin-top:30px;padding-top:16px;color:var(--muted);font-size:12px}
.footer-actions{display:flex;gap:8px;flex-wrap:wrap}
.chip-list{display:flex;gap:8px;flex-wrap:wrap}
.list-item{display:flex;justify-content:space-between;align-items:center;padding:12px;border:1px solid var(--border);border-radius:10px;margin-bottom:10px;background:var(--panel2)}
.list-item .meta{font-size:12px;color:var(--muted);margin-top:3px}
.link-box{display:flex;gap:8px;align-items:center;background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:12px;word-break:break-all}
.progress-bar{height:8px;border-radius:6px;background:var(--panel2);overflow:hidden;display:flex}
.progress-bar div{height:100%}
.thumb{width:46px;height:46px;border-radius:8px;object-fit:cover;border:1px solid var(--border);cursor:pointer}
.photo-view{max-width:100%;border-radius:10px;border:1px solid var(--border)}
/* Driver mobile view */
#driverView{max-width:480px;margin:0 auto;padding:16px}
.d-card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:14px}
.d-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.d-stop{border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px;background:var(--panel2)}
.d-stop.done{border-color:rgba(34,197,94,.4)}
.d-stop h4{margin:0 0 4px}
.camera-btn{display:flex;align-items:center;justify-content:center;gap:8px;background:var(--panel2);border:2px dashed var(--border);border-radius:10px;padding:20px;color:var(--muted);cursor:pointer;font-size:13px}
.camera-btn:hover{border-color:var(--orange)}
</style>
</head>
